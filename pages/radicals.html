<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radical Trainer</title>
<style>
  :root {
    --bg: #f4f4f5;
    --card: #ffffff;
    --ink: #18181b;
    --muted: #71717a;
    --line: #e4e4e7;
    --green: #16a34a;
    --amber: #d97706;
    --accent: #2563eb;
    --sel-bg: #eff6ff;
    color-scheme: light;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #18181b;
      --card: #27272a;
      --ink: #f4f4f5;
      --muted: #a1a1aa;
      --line: #3f3f46;
      --green: #22c55e;
      --amber: #f59e0b;
      --accent: #60a5fa;
      --sel-bg: #1e3a5f;
      color-scheme: dark;
    }
  }
  :root[data-theme="dark"] {
    --bg: #18181b;
    --card: #27272a;
    --ink: #f4f4f5;
    --muted: #a1a1aa;
    --line: #3f3f46;
    --green: #22c55e;
    --amber: #f59e0b;
    --accent: #60a5fa;
    --sel-bg: #1e3a5f;
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap { width: 100%; max-width: 560px; }
  .screen { display: none; }
  .screen.active { display: block; }

  h1 { font-size: 1.6rem; margin: 0 0 4px; text-align: center; }
  .sub { color: var(--muted); text-align: center; margin: 0 0 28px; font-size: .95rem; }

  .label { font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 10px; }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
  .opt {
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 12px;
    padding: 14px 10px;
    font-size: 1rem;
    cursor: pointer;
    transition: border-color .12s, background .12s;
  }
  .opt:hover { border-color: var(--accent); }
  .opt.sel { border-color: var(--accent); background: var(--sel-bg); color: var(--accent); font-weight: 600; }

  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font-size: 1.15rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: border-color .12s;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  .range { display: flex; align-items: flex-end; gap: 12px; margin-bottom: 8px; }
  .range label { flex: 1; display: flex; flex-direction: column; gap: 6px; font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
  .range .dash { padding-bottom: 14px; color: var(--muted); }
  .range select {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    border-radius: 12px;
    padding: 14px 10px;
    font-size: 1rem;
    cursor: pointer;
    appearance: none;
    text-align: center;
  }
  .range select:focus { outline: none; border-color: var(--accent); }
  .rangeInfo { color: var(--muted); font-size: .9rem; margin: 0 0 24px; text-align: center; min-height: 1.2em; }

  .toggle { display: flex; gap: 10px; margin-bottom: 28px; }
  .toggle .opt { flex: 1; }

  .btn {
    display: block;
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    transition: opacity .12s;
  }
  .btn:hover { opacity: .9; }
  .btn.ghost { background: var(--card); color: var(--ink); border: 1px solid var(--line); }

  /* Card screen */
  .topbar { display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: .9rem; margin-bottom: 20px; }
  .topbar a { color: var(--muted); text-decoration: none; cursor: pointer; }
  .topbar a:hover { color: var(--ink); }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    min-height: 320px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .radical { font-size: 9rem; line-height: 1; margin: 0; }
  .variant { font-size: 4rem; color: var(--muted); }
  .hint { color: var(--muted); margin-top: 24px; font-size: .9rem; }

  .answer { display: none; margin-top: 24px; }
  .answer.show { display: block; }
  .pinyin { font-size: 2rem; margin: 0 0 4px; color: var(--accent); }
  .english { font-size: 1.3rem; margin: 0 0 18px; }
  .examples { font-size: 1.6rem; color: var(--ink); margin: 0; }
  .examples small { display: block; font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }

  .speak-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
  .speak {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--accent);
    border-radius: 999px;
    padding: 9px 18px;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: border-color .12s, background .12s, color .12s;
  }
  .speak:hover { border-color: var(--accent); background: var(--sel-bg); }
  .speak.playing { border-color: var(--amber); color: var(--amber); }
  .speak[hidden], .speak-row[hidden], #audioSection[hidden] { display: none; }

  .actions { display: none; gap: 12px; margin-top: 16px; }
  .actions.show { display: flex; }
  .actions .btn { flex: 1; }
  .btn.again { background: var(--amber); }
  .btn.got { background: var(--green); }

  .reveal-row { margin-top: 16px; }

  /* Done screen */
  .done { text-align: center; }
  .done .big { font-size: 3rem; margin: 0 0 8px; }
</style>
<script>
  // Apply saved theme before paint to avoid a flash.
  (function () {
    var t = localStorage.getItem("theme");
    if (t) document.documentElement.setAttribute("data-theme", t);
  })();
</script>
</head>
<body>
<button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
<div class="wrap">

  <!-- START -->
  <section id="start" class="screen active">
    <h1>Radical Trainer</h1>
    <p class="sub">Learn common Chinese radicals — flashcard style.</p>

    <p class="label">Which radicals?</p>
    <div class="range">
      <label>From
        <select id="fromSel"></select>
      </label>
      <span class="dash">&ndash;</span>
      <label>To
        <select id="toSel"></select>
      </label>
    </div>
    <p class="rangeInfo" id="rangeInfo"></p>

    <p class="label">Order</p>
    <div class="toggle" id="orderToggle">
      <button class="opt sel" data-order="shuffle">Shuffle</button>
      <button class="opt" data-order="ordered">In order</button>
    </div>

    <div id="audioSection">
      <p class="label">Audio</p>
      <div class="toggle" id="audioToggle">
        <button class="opt sel" data-audio="on">🔊 Auto-play</button>
        <button class="opt" data-audio="off">Off</button>
      </div>
    </div>

    <button class="btn" id="startBtn">Start</button>
  </section>

  <!-- CARD -->
  <section id="study" class="screen">
    <div class="topbar">
      <a id="quitBtn">&larr; Quit</a>
      <span id="progress">0 / 0</span>
    </div>

    <div class="card" id="card">
      <p class="radical" id="radical">人</p>
      <div class="answer" id="answer">
        <p class="pinyin" id="pinyin"></p>
        <p class="english" id="english"></p>
        <p class="examples"><small>Examples</small><span id="examples"></span></p>
        <div class="speak-row" id="speakRow">
          <button class="speak" id="speakBtn" type="button" title="Replay (R)">🔊 Play</button>
          <button class="speak" id="speakSlowBtn" type="button" title="Read slowly (S)">🐢 Slow</button>
        </div>
      </div>
      <p class="hint" id="hint">Tap card or press Space to reveal</p>
    </div>

    <div class="reveal-row" id="revealRow">
      <button class="btn" id="revealBtn">Reveal</button>
    </div>

    <div class="actions" id="actions">
      <button class="btn again" id="againBtn">Again <small>(1)</small></button>
      <button class="btn got" id="gotBtn">Got it <small>(2)</small></button>
    </div>
  </section>

  <!-- DONE -->
  <section id="done" class="screen">
    <div class="done">
      <p class="big">All cleared! 🎉</p>
      <p class="sub" id="doneSummary"></p>
      <button class="btn" id="restartBtn">Study again</button>
    </div>
  </section>

</div>

<script src="radicals_data.js"></script>
<script>
  // ----- Dark mode toggle -----
  (function () {
    const root = document.documentElement;
    const toggle = document.getElementById("themeToggle");
    const mql = window.matchMedia("(prefers-color-scheme: dark)");
    function current() {
      return root.getAttribute("data-theme") || (mql.matches ? "dark" : "light");
    }
    function syncIcon() {
      toggle.textContent = current() === "dark" ? "☀️" : "🌙";
    }
    toggle.addEventListener("click", () => {
      const next = current() === "dark" ? "light" : "dark";
      root.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
      syncIcon();
    });
    mql.addEventListener("change", () => { if (!root.getAttribute("data-theme")) syncIcon(); });
    syncIcon();
  })();

  // ----- Data: the 40 radicals — loaded from radicals_data.js -----
  const RADICALS = window.RADICALS_DATA;

  const TOTAL = RADICALS.length;            // 40
  const FROM_OPTS = [1, 6, 11, 16, 21, 26, 31, 36];
  const TO_OPTS   = [5, 10, 15, 20, 25, 30, 35, 40];

  // ----- State -----
  let rangeFrom = 1;   // 1-based, inclusive
  let rangeTo = 10;    // 1-based, inclusive
  let order = "shuffle";
  let autoPlay = true;
  let queue = [];        // remaining cards this session
  let totalThisRound = 0;
  let cleared = 0;
  let revealed = false;
  let currentZh = "";

  // ----- Pronunciation: Web Speech API (Option A) -----
  const Speech = (() => {
    const synth = window.speechSynthesis;
    let voice = null;
    function pick() {
      if (!synth) return;
      const zh = synth.getVoices().filter(v => v.lang && v.lang.toLowerCase().startsWith("zh"));
      // prefer mainland simplified, then any Chinese voice
      voice = zh.find(v => /^zh[-_]?(cn|hans)/i.test(v.lang)) || zh[0] || null;
    }
    if (synth) { pick(); synth.addEventListener("voiceschanged", pick); }
    function speak(text, btn, rate) {
      if (!synth || !text) return;
      synth.cancel();
      if (!voice) pick();
      const u = new SpeechSynthesisUtterance(text);
      if (voice) u.voice = voice;
      u.lang = (voice && voice.lang) || "zh-CN";
      u.rate = rate || 0.9;
      if (btn) {
        u.onstart = () => btn.classList.add("playing");
        const done = () => btn.classList.remove("playing");
        u.onend = done; u.onerror = done;
      }
      synth.speak(u);
    }
    return { supported: !!synth, speak };
  })();

  // ----- Elements -----
  const screens = {
    start: document.getElementById("start"),
    study: document.getElementById("study"),
    done:  document.getElementById("done"),
  };
  const el = {
    fromSel:    document.getElementById("fromSel"),
    toSel:      document.getElementById("toSel"),
    rangeInfo:  document.getElementById("rangeInfo"),
    orderToggle:document.getElementById("orderToggle"),
    audioToggle:document.getElementById("audioToggle"),
    audioSection:document.getElementById("audioSection"),
    speakBtn:   document.getElementById("speakBtn"),
    speakSlowBtn:document.getElementById("speakSlowBtn"),
    speakRow:   document.getElementById("speakRow"),
    startBtn:   document.getElementById("startBtn"),
    progress:   document.getElementById("progress"),
    card:       document.getElementById("card"),
    radical:    document.getElementById("radical"),
    answer:     document.getElementById("answer"),
    pinyin:     document.getElementById("pinyin"),
    english:    document.getElementById("english"),
    examples:   document.getElementById("examples"),
    hint:       document.getElementById("hint"),
    revealRow:  document.getElementById("revealRow"),
    revealBtn:  document.getElementById("revealBtn"),
    actions:    document.getElementById("actions"),
    againBtn:   document.getElementById("againBtn"),
    gotBtn:     document.getElementById("gotBtn"),
    quitBtn:    document.getElementById("quitBtn"),
    doneSummary:document.getElementById("doneSummary"),
    restartBtn: document.getElementById("restartBtn"),
  };

  // ----- Setup start screen -----
  function fillSelect(sel, values, selected) {
    values.forEach(v => {
      const o = document.createElement("option");
      o.value = v;
      o.textContent = "#" + v;
      if (v === selected) o.selected = true;
      sel.appendChild(o);
    });
  }
  fillSelect(el.fromSel, FROM_OPTS, rangeFrom);
  fillSelect(el.toSel, TO_OPTS, rangeTo);

  function syncRange() {
    rangeFrom = parseInt(el.fromSel.value, 10);
    rangeTo = parseInt(el.toSel.value, 10);
    // Keep To >= From: if user picks a From past To, bump To up.
    if (rangeTo < rangeFrom) {
      rangeTo = TO_OPTS.find(v => v >= rangeFrom);
      el.toSel.value = rangeTo;
    }
    const count = rangeTo - rangeFrom + 1;
    el.rangeInfo.textContent = `Radicals ${rangeFrom}–${rangeTo} · ${count} card${count === 1 ? "" : "s"}`;
  }
  el.fromSel.addEventListener("change", syncRange);
  el.toSel.addEventListener("change", syncRange);
  syncRange();

  el.orderToggle.addEventListener("click", e => {
    const b = e.target.closest(".opt");
    if (!b) return;
    order = b.dataset.order;
    [...el.orderToggle.children].forEach(c => c.classList.toggle("sel", c === b));
  });

  el.audioToggle.addEventListener("click", e => {
    const b = e.target.closest(".opt");
    if (!b) return;
    autoPlay = b.dataset.audio === "on";
    [...el.audioToggle.children].forEach(c => c.classList.toggle("sel", c === b));
  });

  function show(name) {
    Object.values(screens).forEach(s => s.classList.remove("active"));
    screens[name].classList.add("active");
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ----- Session flow -----
  function startSession() {
    queue = RADICALS.slice(rangeFrom - 1, rangeTo);
    if (order === "shuffle") shuffle(queue);
    else queue = queue.slice(); // copy
    totalThisRound = queue.length;
    cleared = 0;
    show("study");
    nextCard();
  }

  function nextCard() {
    if (queue.length === 0) {
      el.doneSummary.textContent = `You cleared ${totalThisRound} radical${totalThisRound === 1 ? "" : "s"}.`;
      show("done");
      return;
    }
    const c = queue[0];
    revealed = false;
    currentZh = c.base;
    el.radical.innerHTML = c.variant
      ? `${c.base} <span class="variant">(${c.variant})</span>`
      : c.base;
    el.pinyin.textContent = c.pinyin;
    el.english.textContent = c.english;
    el.examples.textContent = c.examples;
    el.speakBtn.classList.remove("playing");
    el.speakSlowBtn.classList.remove("playing");

    el.answer.classList.remove("show");
    el.actions.classList.remove("show");
    el.revealRow.style.display = "block";
    el.hint.style.display = "block";
    updateProgress();
  }

  function updateProgress() {
    el.progress.textContent = `${cleared} / ${totalThisRound}`;
  }

  function reveal() {
    if (revealed) return;
    revealed = true;
    el.answer.classList.add("show");
    el.actions.classList.add("show");
    el.revealRow.style.display = "none";
    el.hint.style.display = "none";
    if (autoPlay) Speech.speak(currentZh, el.speakBtn);
  }

  function gotIt() {
    if (!revealed) return;
    queue.shift();          // remove from session
    cleared++;
    nextCard();
  }

  function again() {
    if (!revealed) return;
    const c = queue.shift();
    // push back near the end so it returns later this session
    const insertAt = Math.min(queue.length, 4);
    queue.splice(insertAt, 0, c);
    nextCard();
  }

  // ----- Events -----
  el.startBtn.addEventListener("click", startSession);
  el.restartBtn.addEventListener("click", () => show("start"));
  el.quitBtn.addEventListener("click", () => show("start"));
  el.card.addEventListener("click", reveal);
  el.revealBtn.addEventListener("click", reveal);
  el.gotBtn.addEventListener("click", gotIt);
  el.againBtn.addEventListener("click", again);
  const SLOW_RATE = 0.5;
  el.speakBtn.addEventListener("click", e => {
    e.stopPropagation();   // don't bubble to the card
    Speech.speak(currentZh, el.speakBtn);
  });
  el.speakSlowBtn.addEventListener("click", e => {
    e.stopPropagation();
    Speech.speak(currentZh, el.speakSlowBtn, SLOW_RATE);
  });

  document.addEventListener("keydown", e => {
    if (!screens.study.classList.contains("active")) return;
    if (e.code === "Space") { e.preventDefault(); reveal(); return; }
    if (!revealed) return;
    if (e.key === "r" || e.key === "R") { e.preventDefault(); Speech.speak(currentZh, el.speakBtn); return; }
    if (e.key === "s" || e.key === "S") { e.preventDefault(); Speech.speak(currentZh, el.speakSlowBtn, SLOW_RATE); return; }
    if (e.key === "1" || e.key === "ArrowLeft")  { e.preventDefault(); again(); }
    if (e.key === "2" || e.key === "ArrowRight" || e.key === "Enter") { e.preventDefault(); gotIt(); }
  });

  // ----- Init -----
  if (!Speech.supported) {           // very old browsers: hide audio UI
    el.audioSection.hidden = true;
    el.speakRow.hidden = true;
    autoPlay = false;
  }
</script>
</body>
</html>
