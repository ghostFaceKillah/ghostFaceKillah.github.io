<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colloquial Character Trainer</title>
<style>
  :root {
    --bg: #f4f4f5;
    --card: #ffffff;
    --ink: #18181b;
    --muted: #71717a;
    --line: #e4e4e7;
    --green: #16a34a;
    --amber: #d97706;
    --accent: #2563eb;
    --sel-bg: #eff6ff;
    color-scheme: light;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #18181b;
      --card: #27272a;
      --ink: #f4f4f5;
      --muted: #a1a1aa;
      --line: #3f3f46;
      --green: #22c55e;
      --amber: #f59e0b;
      --accent: #60a5fa;
      --sel-bg: #1e3a5f;
      color-scheme: dark;
    }
  }
  :root[data-theme="dark"] {
    --bg: #18181b;
    --card: #27272a;
    --ink: #f4f4f5;
    --muted: #a1a1aa;
    --line: #3f3f46;
    --green: #22c55e;
    --amber: #f59e0b;
    --accent: #60a5fa;
    --sel-bg: #1e3a5f;
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap { width: 100%; max-width: 560px; }
  .screen { display: none; }
  .screen.active { display: block; }

  h1 { font-size: 1.6rem; margin: 0 0 4px; text-align: center; }
  .sub { color: var(--muted); text-align: center; margin: 0 0 28px; font-size: .95rem; }

  .label { font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 10px; }

  .sel-input {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    border-radius: 12px;
    padding: 14px 10px;
    font-size: 1rem;
    cursor: pointer;
    appearance: none;
    text-align: center;
    margin-bottom: 8px;
  }
  .sel-input:focus { outline: none; border-color: var(--accent); }
  .rangeInfo { color: var(--muted); font-size: .9rem; margin: 0 0 24px; text-align: center; min-height: 1.2em; }

  .toggle { display: flex; gap: 10px; margin-bottom: 28px; }
  .toggle .opt { flex: 1; }
  .opt {
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 12px;
    padding: 14px 10px;
    font-size: 1rem;
    cursor: pointer;
    transition: border-color .12s, background .12s;
  }
  .opt:hover { border-color: var(--accent); }
  .opt.sel { border-color: var(--accent); background: var(--sel-bg); color: var(--accent); font-weight: 600; }

  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font-size: 1.15rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: border-color .12s;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  .btn {
    display: block;
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    transition: opacity .12s;
  }
  .btn:hover { opacity: .9; }
  .btn.ghost { background: var(--card); color: var(--ink); border: 1px solid var(--line); }

  /* Card screen */
  .topbar { display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: .9rem; margin-bottom: 20px; }
  .topbar a { color: var(--muted); text-decoration: none; cursor: pointer; }
  .topbar a:hover { color: var(--ink); }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    min-height: 340px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .rankTag { color: var(--muted); font-size: .8rem; margin: 0 0 8px; }
  .hanzi { font-size: 6.5rem; line-height: 1; margin: 0; }
  .hint { color: var(--muted); margin-top: 24px; font-size: .9rem; }

  .answer { display: none; margin-top: 20px; }
  .answer.show { display: block; }
  .pinyin { font-size: 1.7rem; margin: 0 0 4px; color: var(--accent); }
  .english { font-size: 1.15rem; margin: 0 0 18px; }

  .example { border-top: 1px solid var(--line); margin-top: 4px; padding-top: 16px; }
  .example small { display: block; font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .exZh { font-size: 1.4rem; margin: 0 0 4px; }
  .exPy { font-size: 1rem; color: var(--accent); margin: 0 0 4px; }
  .exEn { font-size: .95rem; color: var(--muted); margin: 0; }

  .speak-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
  .speak {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--accent);
    border-radius: 999px;
    padding: 9px 16px;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: border-color .12s, background .12s, color .12s;
  }
  .speak:hover { border-color: var(--accent); background: var(--sel-bg); }
  .speak.playing { border-color: var(--amber); color: var(--amber); }
  .speak[hidden], .speak-row[hidden], #audioSection[hidden] { display: none; }

  .actions { display: none; gap: 12px; margin-top: 16px; }
  .actions.show { display: flex; }
  .actions .btn { flex: 1; }
  .btn.again { background: var(--amber); }
  .btn.got { background: var(--green); }

  .reveal-row { margin-top: 16px; }

  /* Done screen */
  .done { text-align: center; }
  .done .big { font-size: 3rem; margin: 0 0 8px; }
</style>
<script>
  // Apply saved theme before paint to avoid a flash.
  (function () {
    var t = localStorage.getItem("theme");
    if (t) document.documentElement.setAttribute("data-theme", t);
  })();
</script>
</head>
<body>
<button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
<div class="wrap">

  <!-- START -->
  <section id="start" class="screen active">
    <h1>Colloquial Character Trainer</h1>
    <p class="sub">The 500 most common Chinese characters, drilled in sets of 20 — with an example sentence, pinyin and pronunciation for each.</p>

    <p class="label">Which set?</p>
    <select class="sel-input" id="setSel"></select>
    <p class="rangeInfo" id="rangeInfo"></p>

    <p class="label">Order</p>
    <div class="toggle" id="orderToggle">
      <button class="opt sel" data-order="shuffle">Shuffle</button>
      <button class="opt" data-order="ordered">In order</button>
    </div>

    <div id="audioSection">
      <p class="label">Audio</p>
      <div class="toggle" id="audioToggle">
        <button class="opt sel" data-audio="on">🔊 Auto-play</button>
        <button class="opt" data-audio="off">Off</button>
      </div>
    </div>

    <button class="btn" id="startBtn">Start</button>
  </section>

  <!-- CARD -->
  <section id="study" class="screen">
    <div class="topbar">
      <a id="quitBtn">&larr; Quit</a>
      <span id="progress">0 / 0</span>
    </div>

    <div class="card" id="card">
      <p class="rankTag" id="rankTag"></p>
      <p class="hanzi" id="hanzi">的</p>
      <div class="answer" id="answer">
        <p class="pinyin" id="pinyin"></p>
        <p class="english" id="english"></p>
        <div class="example">
          <small>Example</small>
          <p class="exZh" id="exZh"></p>
          <p class="exPy" id="exPy"></p>
          <p class="exEn" id="exEn"></p>
        </div>
        <div class="speak-row" id="speakRow">
          <button class="speak" id="speakBtn" type="button" title="Replay character (R)">🔊 Char</button>
          <button class="speak" id="speakSlowBtn" type="button" title="Read character slowly (S)">🐢 Slow</button>
          <button class="speak" id="speakSentBtn" type="button" title="Play example sentence (E)">🗣️ Sentence</button>
        </div>
      </div>
      <p class="hint" id="hint">Tap card or press Space to reveal</p>
    </div>

    <div class="reveal-row" id="revealRow">
      <button class="btn" id="revealBtn">Reveal</button>
    </div>

    <div class="actions" id="actions">
      <button class="btn again" id="againBtn">Again <small>(1)</small></button>
      <button class="btn got" id="gotBtn">Got it <small>(2)</small></button>
    </div>
  </section>

  <!-- DONE -->
  <section id="done" class="screen">
    <div class="done">
      <p class="big">All cleared! 🎉</p>
      <p class="sub" id="doneSummary"></p>
      <button class="btn" id="restartBtn">Study again</button>
    </div>
  </section>

</div>

<script src="colloquial_data.js"></script>
<script>
  // ----- Dark mode toggle -----
  (function () {
    const root = document.documentElement;
    const toggle = document.getElementById("themeToggle");
    const mql = window.matchMedia("(prefers-color-scheme: dark)");
    function current() {
      return root.getAttribute("data-theme") || (mql.matches ? "dark" : "light");
    }
    function syncIcon() {
      toggle.textContent = current() === "dark" ? "☀️" : "🌙";
    }
    toggle.addEventListener("click", () => {
      const next = current() === "dark" ? "light" : "dark";
      root.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
      syncIcon();
    });
    mql.addEventListener("change", () => { if (!root.getAttribute("data-theme")) syncIcon(); });
    syncIcon();
  })();

  // ----- Data -----
  const CHARS = window.COLLOQUIAL_DATA || [];
  const TOTAL = CHARS.length;
  const SET_SIZE = 20;
  const SET_COUNT = Math.ceil(TOTAL / SET_SIZE);

  // ----- State -----
  let setIndex = 0;        // 0-based; SET_COUNT means "All"
  let order = "shuffle";
  let autoPlay = true;
  let queue = [];
  let totalThisRound = 0;
  let cleared = 0;
  let revealed = false;
  let current = null;

  // ----- Pronunciation: Web Speech API -----
  const Speech = (() => {
    const synth = window.speechSynthesis;
    let voice = null;
    function pick() {
      if (!synth) return;
      const zh = synth.getVoices().filter(v => v.lang && v.lang.toLowerCase().startsWith("zh"));
      voice = zh.find(v => /^zh[-_]?(cn|hans)/i.test(v.lang)) || zh[0] || null;
    }
    if (synth) { pick(); synth.addEventListener("voiceschanged", pick); }
    function queue(text, btn, rate) {
      if (!text) return;
      if (!voice) pick();
      const u = new SpeechSynthesisUtterance(text);
      if (voice) u.voice = voice;
      u.lang = (voice && voice.lang) || "zh-CN";
      u.rate = rate || 0.9;
      if (btn) {
        u.onstart = () => btn.classList.add("playing");
        const done = () => btn.classList.remove("playing");
        u.onend = done; u.onerror = done;
      }
      synth.speak(u);
    }
    // Speak one item immediately (cancels anything in progress/queued first).
    function speak(text, btn, rate) {
      if (!synth) return;
      synth.cancel();
      queue(text, btn, rate);
    }
    // Speak several items back-to-back: cancel once, then queue each in
    // order -- the Web Speech API plays queued utterances sequentially.
    function speakSequence(items) {
      if (!synth) return;
      synth.cancel();
      items.forEach(({ text, btn, rate }) => queue(text, btn, rate));
    }
    return { supported: !!synth, speak, speakSequence };
  })();
  const SLOW_RATE = 0.5;

  // ----- Elements -----
  const screens = {
    start: document.getElementById("start"),
    study: document.getElementById("study"),
    done:  document.getElementById("done"),
  };
  const el = {
    setSel:     document.getElementById("setSel"),
    rangeInfo:  document.getElementById("rangeInfo"),
    orderToggle:document.getElementById("orderToggle"),
    audioToggle:document.getElementById("audioToggle"),
    audioSection:document.getElementById("audioSection"),
    speakBtn:   document.getElementById("speakBtn"),
    speakSlowBtn:document.getElementById("speakSlowBtn"),
    speakSentBtn:document.getElementById("speakSentBtn"),
    speakRow:   document.getElementById("speakRow"),
    startBtn:   document.getElementById("startBtn"),
    progress:   document.getElementById("progress"),
    card:       document.getElementById("card"),
    rankTag:    document.getElementById("rankTag"),
    hanzi:      document.getElementById("hanzi"),
    answer:     document.getElementById("answer"),
    pinyin:     document.getElementById("pinyin"),
    english:    document.getElementById("english"),
    exZh:       document.getElementById("exZh"),
    exPy:       document.getElementById("exPy"),
    exEn:       document.getElementById("exEn"),
    hint:       document.getElementById("hint"),
    revealRow:  document.getElementById("revealRow"),
    revealBtn:  document.getElementById("revealBtn"),
    actions:    document.getElementById("actions"),
    againBtn:   document.getElementById("againBtn"),
    gotBtn:     document.getElementById("gotBtn"),
    quitBtn:    document.getElementById("quitBtn"),
    doneSummary:document.getElementById("doneSummary"),
    restartBtn: document.getElementById("restartBtn"),
  };

  // ----- Setup start screen -----
  function setLabel(i) {
    const from = i * SET_SIZE + 1;
    const to = Math.min((i + 1) * SET_SIZE, TOTAL);
    return `Set ${i + 1} · ${from}–${to}`;
  }
  for (let i = 0; i < SET_COUNT; i++) {
    const o = document.createElement("option");
    o.value = i;
    o.textContent = setLabel(i);
    el.setSel.appendChild(o);
  }
  {
    const oAll = document.createElement("option");
    oAll.value = "all";
    oAll.textContent = `All · 1–${TOTAL}`;
    el.setSel.appendChild(oAll);
  }

  function currentSlice() {
    if (el.setSel.value === "all") return CHARS.slice();
    const i = parseInt(el.setSel.value, 10);
    return CHARS.slice(i * SET_SIZE, i * SET_SIZE + SET_SIZE);
  }

  function syncRange() {
    const slice = currentSlice();
    const count = slice.length;
    el.rangeInfo.textContent = count
      ? `Characters #${slice[0].rank}–#${slice[slice.length - 1].rank} · ${count} card${count === 1 ? "" : "s"}`
      : "No characters in this set yet.";
  }
  el.setSel.addEventListener("change", syncRange);
  syncRange();

  el.orderToggle.addEventListener("click", e => {
    const b = e.target.closest(".opt");
    if (!b) return;
    order = b.dataset.order;
    [...el.orderToggle.children].forEach(c => c.classList.toggle("sel", c === b));
  });

  el.audioToggle.addEventListener("click", e => {
    const b = e.target.closest(".opt");
    if (!b) return;
    autoPlay = b.dataset.audio === "on";
    [...el.audioToggle.children].forEach(c => c.classList.toggle("sel", c === b));
  });

  function show(name) {
    Object.values(screens).forEach(s => s.classList.remove("active"));
    screens[name].classList.add("active");
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ----- Session flow -----
  function startSession() {
    queue = currentSlice();
    if (order === "shuffle") shuffle(queue);
    else queue = queue.slice();
    totalThisRound = queue.length;
    cleared = 0;
    show("study");
    nextCard();
  }

  function nextCard() {
    if (queue.length === 0) {
      el.doneSummary.textContent = `You cleared ${totalThisRound} character${totalThisRound === 1 ? "" : "s"}.`;
      show("done");
      return;
    }
    current = queue[0];
    revealed = false;
    el.rankTag.textContent = `#${current.rank}`;
    el.hanzi.textContent = current.c;
    el.pinyin.textContent = current.py;
    el.english.textContent = current.en;
    el.exZh.textContent = current.ex;
    el.exPy.textContent = current.exPy;
    el.exEn.textContent = current.exEn;
    el.speakBtn.classList.remove("playing");
    el.speakSlowBtn.classList.remove("playing");
    el.speakSentBtn.classList.remove("playing");

    el.answer.classList.remove("show");
    el.actions.classList.remove("show");
    el.revealRow.style.display = "block";
    el.hint.style.display = "block";
    updateProgress();
  }

  function updateProgress() {
    el.progress.textContent = `${cleared} / ${totalThisRound}`;
  }

  function reveal() {
    if (revealed) return;
    revealed = true;
    el.answer.classList.add("show");
    el.actions.classList.add("show");
    el.revealRow.style.display = "none";
    el.hint.style.display = "none";
    if (autoPlay) {
      Speech.speakSequence([
        { text: current.c, btn: el.speakBtn },
        { text: current.ex, btn: el.speakSentBtn },
      ]);
    }
  }

  function gotIt() {
    if (!revealed) return;
    queue.shift();
    cleared++;
    nextCard();
  }

  function again() {
    if (!revealed) return;
    const c = queue.shift();
    const insertAt = Math.min(queue.length, 4);
    queue.splice(insertAt, 0, c);
    nextCard();
  }

  // ----- Events -----
  el.startBtn.addEventListener("click", startSession);
  el.restartBtn.addEventListener("click", () => show("start"));
  el.quitBtn.addEventListener("click", () => show("start"));
  el.card.addEventListener("click", reveal);
  el.revealBtn.addEventListener("click", reveal);
  el.gotBtn.addEventListener("click", gotIt);
  el.againBtn.addEventListener("click", again);
  el.speakBtn.addEventListener("click", e => {
    e.stopPropagation();
    Speech.speak(current.c, el.speakBtn);
  });
  el.speakSlowBtn.addEventListener("click", e => {
    e.stopPropagation();
    Speech.speak(current.c, el.speakSlowBtn, SLOW_RATE);
  });
  el.speakSentBtn.addEventListener("click", e => {
    e.stopPropagation();
    Speech.speak(current.ex, el.speakSentBtn);
  });

  document.addEventListener("keydown", e => {
    if (!screens.study.classList.contains("active")) return;
    if (e.code === "Space") { e.preventDefault(); reveal(); return; }
    if (!revealed) return;
    if (e.key === "r" || e.key === "R") { e.preventDefault(); Speech.speak(current.c, el.speakBtn); return; }
    if (e.key === "s" || e.key === "S") { e.preventDefault(); Speech.speak(current.c, el.speakSlowBtn, SLOW_RATE); return; }
    if (e.key === "e" || e.key === "E") { e.preventDefault(); Speech.speak(current.ex, el.speakSentBtn); return; }
    if (e.key === "1" || e.key === "ArrowLeft")  { e.preventDefault(); again(); }
    if (e.key === "2" || e.key === "ArrowRight" || e.key === "Enter") { e.preventDefault(); gotIt(); }
  });

  // ----- Init -----
  if (!Speech.supported) {
    el.audioSection.hidden = true;
    el.speakRow.hidden = true;
    autoPlay = false;
  }
</script>
</body>
</html>
