<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Trainer</title>
<style>
  :root {
    --bg: #f4f4f5;
    --card: #ffffff;
    --ink: #18181b;
    --muted: #71717a;
    --line: #e4e4e7;
    --green: #16a34a;
    --amber: #d97706;
    --accent: #2563eb;
    --sel-bg: #eff6ff;
    color-scheme: light;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #18181b;
      --card: #27272a;
      --ink: #f4f4f5;
      --muted: #a1a1aa;
      --line: #3f3f46;
      --green: #22c55e;
      --amber: #f59e0b;
      --accent: #60a5fa;
      --sel-bg: #1e3a5f;
      color-scheme: dark;
    }
  }
  :root[data-theme="dark"] {
    --bg: #18181b;
    --card: #27272a;
    --ink: #f4f4f5;
    --muted: #a1a1aa;
    --line: #3f3f46;
    --green: #22c55e;
    --amber: #f59e0b;
    --accent: #60a5fa;
    --sel-bg: #1e3a5f;
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap { width: 100%; max-width: 560px; }
  .screen { display: none; }
  .screen.active { display: block; }

  h1 { font-size: 1.6rem; margin: 0 0 4px; text-align: center; }
  .sub { color: var(--muted); text-align: center; margin: 0 0 28px; font-size: .95rem; }

  .label { font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 10px; }

  .opt {
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 12px;
    padding: 14px 10px;
    font-size: 1rem;
    cursor: pointer;
    transition: border-color .12s, background .12s;
    color: var(--ink);
  }
  .opt:hover { border-color: var(--accent); }
  .opt.sel { border-color: var(--accent); background: var(--sel-bg); color: var(--accent); font-weight: 600; }

  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font-size: 1.15rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: border-color .12s;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  /* Lesson picker */
  .sel-input {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    border-radius: 12px;
    padding: 14px 12px;
    font-size: 1rem;
    cursor: pointer;
    appearance: none;
    margin-bottom: 16px;
  }
  .sel-input:focus { outline: none; border-color: var(--accent); }
  .rangeInfo { color: var(--muted); font-size: .9rem; margin: 0 0 24px; text-align: center; min-height: 1.2em; }

  .toggle { display: flex; gap: 10px; margin-bottom: 28px; }
  .toggle .opt { flex: 1; }

  .btn {
    display: block;
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    transition: opacity .12s;
  }
  .btn:hover { opacity: .9; }
  .btn.ghost { background: var(--card); color: var(--ink); border: 1px solid var(--line); }

  /* Card screen */
  .topbar { display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: .9rem; margin-bottom: 20px; }
  .topbar a { color: var(--muted); text-decoration: none; cursor: pointer; }
  .topbar a:hover { color: var(--ink); }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    min-height: 320px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .word { font-size: 6rem; line-height: 1.1; margin: 0; }
  .hint { color: var(--muted); margin-top: 24px; font-size: .9rem; }

  .answer { display: none; margin-top: 24px; }
  .answer.show { display: block; }
  .pinyin { font-size: 2rem; margin: 0 0 4px; color: var(--accent); }
  .pos { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin: 0 0 10px; }
  .english { font-size: 1.3rem; margin: 0; }

  .breakdown { font-size: .85rem; color: var(--muted); margin: 14px 0 6px; line-height: 1.5; }
  .breakdown b { color: var(--ink); font-weight: 600; }
  .mnemonic { font-size: .98rem; margin: 0; line-height: 1.55; text-align: left; }
  .mnemonic b { font-weight: 600; }
  .mnemonic i { font-style: italic; }
  .mnemonic::before { content: "💡 "; }
  .breakdown:empty, .mnemonic:empty { display: none; margin: 0; }

  .speak-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
  .speak {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--accent);
    border-radius: 999px;
    padding: 9px 18px;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: border-color .12s, background .12s, color .12s;
  }
  .speak:hover { border-color: var(--accent); background: var(--sel-bg); }
  .speak.playing { border-color: var(--amber); color: var(--amber); }
  .speak[hidden], .speak-row[hidden], #audioSection[hidden] { display: none; }

  .actions { display: none; gap: 12px; margin-top: 16px; }
  .actions.show { display: flex; }
  .actions .btn { flex: 1; }
  .btn.again { background: var(--amber); }
  .btn.got { background: var(--green); }

  .reveal-row { margin-top: 16px; }

  /* Done screen */
  .done { text-align: center; }
  .done .big { font-size: 3rem; margin: 0 0 8px; }
</style>
<script>
  // Apply saved theme before paint to avoid a flash.
  (function () {
    var t = localStorage.getItem("theme");
    if (t) document.documentElement.setAttribute("data-theme", t);
  })();
</script>
</head>
<body>
<button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
<div class="wrap">

  <!-- START -->
  <section id="start" class="screen active">
    <h1>Word Trainer</h1>
    <p class="sub">Learn Chinese words — flashcard style. (Integrated Chinese Lessons 1–20, plus Food, Common Verbs, Numbers &amp; Tutor Notes)</p>

    <p class="label">Lesson</p>
    <select class="sel-input" id="lessonSel"></select>

    <p class="label" id="dialogueLabel">Dialogue</p>
    <div class="toggle" id="dialogueToggle">
      <button class="opt sel" data-dia="1">Dialogue 1</button>
      <button class="opt" data-dia="2">Dialogue 2</button>
      <button class="opt" data-dia="BOTH">Both</button>
    </div>
    <p class="rangeInfo" id="rangeInfo"></p>

    <p class="label">Order</p>
    <div class="toggle" id="orderToggle">
      <button class="opt sel" data-order="shuffle">Shuffle</button>
      <button class="opt" data-order="ordered">In order</button>
    </div>

    <div id="audioSection">
      <p class="label">Audio</p>
      <div class="toggle" id="audioToggle">
        <button class="opt sel" data-audio="tts">🔊 TTS</button>
        <button class="opt" data-audio="mp3">🎵 MP3</button>
        <button class="opt" data-audio="off">Off</button>
      </div>
    </div>

    <button class="btn" id="startBtn">Start</button>
  </section>

  <!-- CARD -->
  <section id="study" class="screen">
    <div class="topbar">
      <a id="quitBtn">&larr; Quit</a>
      <span id="progress">0 / 0</span>
    </div>

    <div class="card" id="card">
      <p class="word" id="word">你好</p>
      <div class="answer" id="answer">
        <p class="pinyin" id="pinyin"></p>
        <p class="pos" id="pos"></p>
        <p class="english" id="english"></p>
        <p class="breakdown" id="breakdown"></p>
        <p class="mnemonic" id="mnemonic"></p>
        <div class="speak-row" id="speakRow">
          <button class="speak" id="speakBtn" type="button" title="Replay (R)">🔊 Play</button>
          <button class="speak" id="speakSlowBtn" type="button" title="Read slowly (S)">🐢 Slow</button>
          <button class="speak" id="speakMp3Btn" type="button" title="Play native audio (M)">🎵 MP3</button>
        </div>
      </div>
      <p class="hint" id="hint">Tap card or press Space to reveal</p>
    </div>

    <div class="reveal-row" id="revealRow">
      <button class="btn" id="revealBtn">Reveal</button>
    </div>

    <div class="actions" id="actions">
      <button class="btn again" id="againBtn">Again <small>(1)</small></button>
      <button class="btn got" id="gotBtn">Got it <small>(2)</small></button>
    </div>
  </section>

  <!-- DONE -->
  <section id="done" class="screen">
    <div class="done">
      <p class="big">All cleared! 🎉</p>
      <p class="sub" id="doneSummary"></p>
      <button class="btn" id="restartBtn">Study again</button>
    </div>
  </section>

</div>

<script>
  // ----- Dark mode toggle -----
  (function () {
    const root = document.documentElement;
    const toggle = document.getElementById("themeToggle");
    const mql = window.matchMedia("(prefers-color-scheme: dark)");
    function current() {
      return root.getAttribute("data-theme") || (mql.matches ? "dark" : "light");
    }
    function syncIcon() {
      toggle.textContent = current() === "dark" ? "☀️" : "🌙";
    }
    toggle.addEventListener("click", () => {
      const next = current() === "dark" ? "light" : "dark";
      root.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
      syncIcon();
    });
    mql.addEventListener("change", () => { if (!root.getAttribute("data-theme")) syncIcon(); });
    syncIcon();
  })();

  // ----- Lessons (theme per lesson; each has dialogues 1 & 2) -----
  const LESSONS = [
    { num: 1,  theme: "Greetings" },
    { num: 2,  theme: "Family" },
    { num: 3,  theme: "Time" },
    { num: 4,  theme: "Hobbies" },
    { num: 5,  theme: "Visiting Friends" },
    { num: 6,  theme: "Making Appointments" },
    { num: 7,  theme: "Studying Chinese" },
    { num: 8,  theme: "School Life" },
    { num: 9,  theme: "Shopping" },
    { num: 10, theme: "Transportation" },
    { num: 11, theme: "Weather" },
    { num: 12, theme: "Dining" },
    { num: 13, theme: "Directions" },
    { num: 14, theme: "Birthday Party" },
    { num: 15, theme: "Seeing a Doctor" },
    { num: 16, theme: "Dating" },
    { num: 17, theme: "Renting an Apartment" },
    { num: 18, theme: "Sports" },
    { num: 19, theme: "Travel" },
    { num: 20, theme: "At the Airport" },
  ];

  // ----- Topic lessons (standalone themes, not from Integrated Chinese) -----
  // These have no dialogues; their words carry lesson: "<id>" (e.g. "FOOD").
  const TOPICS = [
    { id: "FOOD",    theme: "Food & Drink" },
    { id: "VERBS",   theme: "Common Verbs" },
    { id: "NUMBERS", theme: "Numbers" },
    { id: "TUTOR",   theme: "Tutor Notes" },
  ];

  // ----- Data: vocabulary (Integrated Chinese, Level 1, Lessons 1–20) -----
  // w = word, pinyin, pos = part of speech, def = definition, lesson = "L<n>D<d>".
  // Lessons 1–2 are transcribed from the textbook tables; Lessons 3–20 are
  // compiled from the same series' standard vocabulary (core vocab per dialogue).
  const WORDS = [
    // ----- Lesson 1, Dialogue 1 -----
    { w: "你",     pinyin: "nǐ",          pos: "pr",     def: "you",                                                              mnem: "A <b>person</b> (亻) standing right in front of you — 你 is “you.” The 尔 on the right carries the “ni” sound.", parts: "亻 person + 尔 (≈ <b>ní</b>, sound)", lesson: "L1D1" },
    { w: "好",     pinyin: "hǎo",         pos: "adj",    def: "fine, good, nice, OK, it's settled",                               mnem: "A <b>woman</b> (女) holding her <b>child</b> (子) — when mother and child are together, everything is <b>good</b>.", parts: "女 woman + 子 child", lesson: "L1D1" },
    { w: "请",     pinyin: "qǐng",        pos: "v",      def: "please (polite form of request); to treat or to invite (somebody)", mnem: "You use polite <b>speech</b> (讠) to say “please.” 青 (green/young) gives the “qing” sound.", parts: "讠 speech + 青 (≈ <b>qīng</b>, sound)", lesson: "L1D1" },
    { w: "问",     pinyin: "wèn",         pos: "v",      def: "to ask (a question)",                                              mnem: "Put your <b>mouth</b> (口) up to the <b>door</b> (门) and <b>ask</b> a question. The door also hints the sound.", parts: "门 door (≈ <b>mén</b>, sound) + 口 mouth", lesson: "L1D1" },
    { w: "贵",     pinyin: "guì",         pos: "adj",    def: "honorable; expensive",                                             mnem: "Anything sitting on a pile of <b>shells/money</b> (贝) at the bottom is <b>expensive</b> — and worthy of honor.", parts: "… + 贝 cowrie shell (money)", lesson: "L1D1" },
    { w: "姓",     pinyin: "xìng",        pos: "v/n",    def: "(one's) family name is…; family name",                             mnem: "In ancient times your <b>family name</b> came from the <b>woman</b> (女) you were <b>born</b> (生) to — surnames passed through the mother.", parts: "女 woman + 生 (≈ <b>shēng</b>, born)", lesson: "L1D1" },
    { w: "我",     pinyin: "wǒ",          pos: "pr",     def: "I, me",                                                            mnem: "<b>I</b> grip my <b>spear</b> (戈) and plant my feet — “me first, this is mine.”", parts: "contains 戈 dagger-axe", lesson: "L1D1" },
    { w: "呢",     pinyin: "ne",          pos: "qp",     def: "(question particle)",                                              mnem: "A little <b>mouth</b> (口) sound you tack on to bounce a question back: “And you? 你呢?”", parts: "口 mouth + 尼 (≈ <b>ní</b>, sound)", lesson: "L1D1" },
    { w: "小姐",   pinyin: "xiǎojiě",     pos: "n",      def: "Miss, young lady",                                                 mnem: "A “<b>small older-sister</b>” (小 + 姐) is a young lady — <b>Miss</b>.", parts: "小 small + 姐 older sister", lesson: "L1D1" },
    { w: "叫",     pinyin: "jiào",        pos: "v",      def: "to be called, to call",                                            mnem: "Open your <b>mouth</b> (口) and <b>call out</b> a name — 叫.", parts: "口 mouth + 丩 (≈ sound)", lesson: "L1D1" },
    { w: "什么",   pinyin: "shénme",      pos: "qpr",    def: "what",                                                             mnem: "A <b>person</b> (亻) facing <b>ten</b> (十) confusing things throws up their hands: “<b>What</b> is all this?”", parts: "什 (亻 person + 十 ten) + 么", lesson: "L1D1" },
    { w: "名字",   pinyin: "míngzi",      pos: "n",      def: "name",                                                             mnem: "In the <b>evening</b> dark (夕) you call out with your <b>mouth</b> (口) to <b>name</b> who's there. 字: a <b>child</b> (子) under a <b>roof</b> (宀) is given a written name.", parts: "名 (夕 evening + 口 mouth) + 字 (宀 roof + 子 child)", lesson: "L1D1" },
    { w: "先生",   pinyin: "xiānsheng",   pos: "n",      def: "Mr., husband, teacher",                                            mnem: "The one “<b>born first</b>” (先 + 生) — the elder, the gentleman: <b>Mr.</b>", parts: "先 first + 生 born", lesson: "L1D1" },
    { w: "李友",   pinyin: "Lǐ Yǒu",      pos: "pn",     def: "(a personal name)",                                                mnem: "“Li You” = a <b>plum</b> (李) <b>friend</b> (友). Picture a friend handing you a plum.", parts: "李 plum + 友 friend", lesson: "L1D1" },
    { w: "李",     pinyin: "lǐ",          pos: "pn/n",   def: "(a family name); plum",                                            mnem: "A <b>tree</b> (木) heavy with little <b>fruit/children</b> (子) — the <b>plum</b> tree, and a very common surname.", parts: "木 tree + 子 child", lesson: "L1D1" },
    { w: "王朋",   pinyin: "Wáng Péng",   pos: "pn",     def: "(a personal name)",                                                mnem: "“Wang Peng” = the <b>king</b> (王) of <b>friends</b> (朋).", parts: "王 king + 朋 friend", lesson: "L1D1" },
    { w: "王",     pinyin: "wáng",        pos: "pn/n",   def: "(a family name); king",                                            mnem: "The <b>king</b> (王) is the vertical stroke that connects the three horizontals — heaven, humanity and earth.", parts: "three horizontal lines + one vertical", lesson: "L1D1" },

    // ----- Lesson 1, Dialogue 2 -----
    { w: "是",     pinyin: "shì",         pos: "v",      def: "to be",                                                            mnem: "Under the <b>sun</b> (日), what is <b>correct/upright</b> (正) — that's how it <b>is</b>.", parts: "日 sun + 正 correct", lesson: "L1D2" },
    { w: "老师",   pinyin: "lǎoshī",      pos: "n",      def: "teacher",                                                          mnem: "An <b>old</b> (老) <b>master</b> (师) — your <b>teacher</b>.", parts: "老 old + 师 master", lesson: "L1D2" },
    { w: "吗",     pinyin: "ma",          pos: "qp",     def: "(question particle)",                                              mnem: "A <b>mouth</b> (口) beside a <b>horse</b> (马, “ma”) — turns any sentence into a yes/no question.", parts: "口 mouth + 马 (≈ <b>mǎ</b>, sound)", lesson: "L1D2" },
    { w: "不",     pinyin: "bù",          pos: "adv",    def: "not, no",                                                          mnem: "A bird flying up that hits a ceiling — it can <b>not</b> go any higher.", parts: "whole-character image", lesson: "L1D2" },
    { w: "学生",   pinyin: "xuésheng",    pos: "n",      def: "student",                                                          mnem: "<b>Study</b> (学) + <b>grow</b> (生) = a <b>student</b>. 学 shows a child under a roof gathering knowledge.", parts: "学 study + 生 born/grow", lesson: "L1D2" },
    { w: "也",     pinyin: "yě",          pos: "adv",    def: "too, also",                                                        mnem: "A little curling tail you add to a sentence: “me <b>too</b>.”", parts: "whole-character image", lesson: "L1D2" },
    { w: "人",     pinyin: "rén",         pos: "n",      def: "people, person",                                                   mnem: "Two legs mid-stride — a walking <b>person</b>.", parts: "pictograph", lesson: "L1D2" },
    { w: "中国",   pinyin: "Zhōngguó",    pos: "pn",     def: "China",                                                            mnem: "The <b>Middle</b> (中, a line through the center of a box) <b>Kingdom</b> (国, jade/king 玉 inside walls 囗) — <b>China</b>.", parts: "中 middle + 国 country", lesson: "L1D2" },
    { w: "北京",   pinyin: "Běijīng",     pos: "pn",     def: "Beijing",                                                          mnem: "The <b>Northern</b> (北 — two people back-to-back; north is at your back) <b>Capital</b> (京).", parts: "北 north + 京 capital", lesson: "L1D2" },
    { w: "美国",   pinyin: "Měiguó",      pos: "pn",     def: "America",                                                          mnem: "The “<b>Beautiful</b> (美) <b>Country</b> (国)” — China's name for America. 美 = a <b>big</b> (大) <b>sheep</b> (羊) = beautiful/delicious.", parts: "美 beautiful + 国 country", lesson: "L1D2" },
    { w: "纽约",   pinyin: "Niǔyuē",      pos: "pn",     def: "New York",                                                         mnem: "Just sound it out: “<b>Niǔ-yuē</b>” ≈ “New York.” The 纟(silk) on both halves is decoration.", parts: "sound transcription (纟silk + …)", lesson: "L1D2" },

    // ----- Lesson 2, Dialogue 1 -----
    { w: "那",     pinyin: "nà",          pos: "pr",     def: "that",                                                             mnem: "<b>That</b> one — over <i>there</i>, off by the <b>city</b> (阝) on the right.", parts: "… + 阝 (city, right)", lesson: "L2D1" },
    { w: "的",     pinyin: "de",          pos: "p",      def: "(a possessive or descriptive particle)",                           mnem: "A <b>white</b> (白) <b>spoon</b> (勺): the single most common character in Chinese — the “'s” that links owner to thing.", parts: "白 white + 勺 spoon", lesson: "L2D1" },
    { w: "照片",   pinyin: "zhàopiàn",    pos: "n",      def: "picture, photo",                                                   mnem: "Light <b>shines</b> (照, note the four fire-dots 灬) onto a flat <b>card</b> (片) — a <b>photo</b>.", parts: "照 shine (灬 fire/light) + 片 slice/card", lesson: "L2D1" },
    { w: "这",     pinyin: "zhè",         pos: "pr",     def: "this",                                                             mnem: "<b>Walk</b> (辶) right up and point: “<b>this</b> one, here.”", parts: "辶 walk + 文", lesson: "L2D1" },
    { w: "爸爸",   pinyin: "bàba",        pos: "n",      def: "father, dad",                                                      mnem: "<b>Father</b> (父) on top, 巴 (“ba”) below — <b>dad</b>.", parts: "父 father + 巴 (≈ <b>bā</b>, sound)", lesson: "L2D1" },
    { w: "妈妈",   pinyin: "māma",        pos: "n",      def: "mother, mom",                                                      mnem: "A <b>woman</b> (女) who works like a <b>horse</b> (马, “ma”) for the family — <b>mom</b>.", parts: "女 woman + 马 (≈ <b>mǎ</b>, sound)", lesson: "L2D1" },
    { w: "个",     pinyin: "gè/ge",       pos: "m",      def: "(measure word for many common everyday objects)",                  mnem: "The all-purpose counter. Picture a little <b>person</b> (人) ticking off items one by one.", parts: "人 person + 丨", lesson: "L2D1" },

    { w: "两",     pinyin: "liǎng",       pos: "nu",     def: "two (of something); a couple", mnem: "Two people under one roof — the <b>two</b> used before measure words.", parts: "一 roof + 兩", lesson: "NUMBERS" },
    { w: "半",     pinyin: "bàn",         pos: "nu",     def: "half",                        mnem: "An ox (牛) split down the middle — a <b>half</b>.", parts: "八 split + 牛 ox", lesson: "NUMBERS" },
    { w: "几",     pinyin: "jǐ",          pos: "nu",     def: "how many; a few",             mnem: "A small bracket shape asking 'how many?' — <b>a few</b>.", parts: "pictograph of a stool", lesson: "NUMBERS" },
    { w: "多少",   pinyin: "duōshǎo",     pos: "nu",     def: "how many, how much",          mnem: "<b>Many</b> (多) or <b>few</b> (少) — asking <b>how much</b>.", parts: "多 many + 少 few", lesson: "NUMBERS" },
    { w: "第一",   pinyin: "dìyī",        pos: "nu",     def: "first (ordinal)",             mnem: "The ordinal marker 第 + <b>one</b> (一) — <b>first</b>.", parts: "第 ordinal + 一 one", lesson: "NUMBERS" },
    { w: "号",     pinyin: "hào",         pos: "n",      def: "number (in a series); day of month", mnem: "A <b>mouth</b> (口) calling out a <b>number</b> in line.", parts: "口 mouth + 丂", lesson: "NUMBERS" },

    // ----- Topic: Tutor Notes (vocab picked up in tutoring sessions) -----
    { w: "工程师", pinyin: "gōngchéngshī", pos: "n",    def: "engineer",                    mnem: "A <b>work</b> (工) <b>procedure</b> (程) run by a <b>master</b> (师) — the <b>engineer</b>.", parts: "工 work + 程 procedure + 师 master", lesson: "TUTOR" },
    { w: "工程",   pinyin: "gōngchéng",   pos: "n",      def: "engineering; project",       mnem: "<b>Work</b> (工) that follows a set <b>procedure</b> (程) — an engineering <b>project</b>.", parts: "工 work + 程 procedure", lesson: "TUTOR" },
    { w: "软件",   pinyin: "ruǎnjiàn",    pos: "n",      def: "software",                   mnem: "The <b>soft</b> (软) <b>item</b> (件) inside the machine — <b>software</b>. (Hardware is 硬件, the “hard item.”)", parts: "软 soft + 件 item", lesson: "TUTOR" },
    { w: "波兰",   pinyin: "Bōlán",       pos: "pn",     def: "Poland",                     mnem: "<b>Waves</b> (波) of <b>orchids</b> (兰) — pure sound-borrowing for <b>Po-land</b>. Tones 1 + 2: Bō-lán.", parts: "波 wave (≈ <b>bō</b>) + 兰 orchid (≈ <b>lán</b>)", lesson: "TUTOR" },
    { w: "爸爸妈妈", pinyin: "bàba māma", pos: "n",      def: "mom and dad; one's parents",  mnem: "Everyday Chinese just says both: <b>dad</b> (爸爸) + <b>mom</b> (妈妈) = <b>parents</b>.", parts: "爸爸 dad + 妈妈 mom", lesson: "TUTOR" },
  ];

  // ----- State -----
  let selectedLesson = 1;        // lesson number 1–10, or "ALL"
  let selectedDialogue = 1;      // 1, 2, or "BOTH"
  let order = "shuffle";
  let autoPlay = "tts";
  let queue = [];        // remaining cards this session
  let totalThisRound = 0;
  let cleared = 0;
  let revealed = false;
  let currentZh = "";

  // ----- Pronunciation: Web Speech API -----
  const Speech = (() => {
    const synth = window.speechSynthesis;
    let voice = null;
    function pick() {
      if (!synth) return;
      const zh = synth.getVoices().filter(v => v.lang && v.lang.toLowerCase().startsWith("zh"));
      // prefer mainland simplified, then any Chinese voice
      voice = zh.find(v => /^zh[-_]?(cn|hans)/i.test(v.lang)) || zh[0] || null;
    }
    if (synth) { pick(); synth.addEventListener("voiceschanged", pick); }
    function speak(text, btn, rate) {
      if (!synth || !text) return;
      synth.cancel();
      if (!voice) pick();
      const u = new SpeechSynthesisUtterance(text);
      if (voice) u.voice = voice;
      u.lang = (voice && voice.lang) || "zh-CN";
      u.rate = rate || 0.9;
      if (btn) {
        u.onstart = () => btn.classList.add("playing");
        const done = () => btn.classList.remove("playing");
        u.onend = done; u.onerror = done;
      }
      synth.speak(u);
    }
    return { supported: !!synth, speak };
  })();

  // ----- Pronunciation: MP3 files -----
  const Mp3Audio = (() => {
    const BASE = "/audio/words/";
    let current = null;
    function play(word, btn) {
      if (current) { current.pause(); current = null; }
      const a = new Audio(BASE + encodeURIComponent(word) + ".mp3");
      if (btn) {
        a.onplay  = () => btn.classList.add("playing");
        const done = () => { btn.classList.remove("playing"); if (current === a) current = null; };
        a.onended = done;
        a.onerror = done;
      }
      current = a;
      a.play().catch(() => { if (btn) btn.classList.remove("playing"); current = null; });
    }
    function stop() { if (current) { current.pause(); current = null; } }
    return { play, stop };
  })();

  // ----- Elements -----
  const screens = {
    start: document.getElementById("start"),
    study: document.getElementById("study"),
    done:  document.getElementById("done"),
  };
  const el = {
    lessonSel:  document.getElementById("lessonSel"),
    dialogueLabel: document.getElementById("dialogueLabel"),
    dialogueToggle: document.getElementById("dialogueToggle"),
    rangeInfo:  document.getElementById("rangeInfo"),
    orderToggle:document.getElementById("orderToggle"),
    audioToggle:document.getElementById("audioToggle"),
    audioSection:document.getElementById("audioSection"),
    speakBtn:   document.getElementById("speakBtn"),
    speakSlowBtn:document.getElementById("speakSlowBtn"),
    speakMp3Btn: document.getElementById("speakMp3Btn"),
    speakRow:   document.getElementById("speakRow"),
    startBtn:   document.getElementById("startBtn"),
    progress:   document.getElementById("progress"),
    card:       document.getElementById("card"),
    word:       document.getElementById("word"),
    answer:     document.getElementById("answer"),
    pinyin:     document.getElementById("pinyin"),
    pos:        document.getElementById("pos"),
    english:    document.getElementById("english"),
    breakdown:  document.getElementById("breakdown"),
    mnemonic:   document.getElementById("mnemonic"),
    hint:       document.getElementById("hint"),
    revealRow:  document.getElementById("revealRow"),
    revealBtn:  document.getElementById("revealBtn"),
    actions:    document.getElementById("actions"),
    againBtn:   document.getElementById("againBtn"),
    gotBtn:     document.getElementById("gotBtn"),
    quitBtn:    document.getElementById("quitBtn"),
    doneSummary:document.getElementById("doneSummary"),
    restartBtn: document.getElementById("restartBtn"),
  };

  // ----- Setup start screen -----
  // Decode a word's "L<n>D<d>" id into { num, dia }.
  function parseLesson(id) {
    const m = /^L(\d+)D(\d+)$/.exec(id);
    return { num: +m[1], dia: +m[2] };
  }
  // A topic lesson (Food, Verbs, …) uses a plain id rather than "L<n>D<d>".
  function isTopicId(id) { return !/^L\d+D\d+$/.test(id); }
  function matchesSelection(w) {
    // When a topic is selected, match only that topic and ignore dialogue.
    if (typeof selectedLesson === "string" && selectedLesson !== "ALL") {
      return w.lesson === selectedLesson;
    }
    // "All lessons" and numeric lessons cover the Integrated Chinese words only.
    if (isTopicId(w.lesson)) return false;
    const { num, dia } = parseLesson(w.lesson);
    if (selectedLesson !== "ALL" && num !== selectedLesson) return false;
    if (selectedDialogue !== "BOTH" && dia !== selectedDialogue) return false;
    return true;
  }
  function selectedWords() {
    return WORDS.filter(matchesSelection);
  }

  // Populate the lesson dropdown: "All lessons" + one option per lesson.
  function buildLessonSelect() {
    const icGroup = document.createElement("optgroup");
    icGroup.label = "Integrated Chinese";
    const all = document.createElement("option");
    all.value = "ALL";
    all.textContent = "All lessons";
    icGroup.appendChild(all);
    LESSONS.forEach(l => {
      const o = document.createElement("option");
      o.value = String(l.num);
      o.textContent = `Lesson ${l.num} · ${l.theme}`;
      icGroup.appendChild(o);
    });
    el.lessonSel.appendChild(icGroup);

    const topicGroup = document.createElement("optgroup");
    topicGroup.label = "Topics";
    TOPICS.forEach(t => {
      const o = document.createElement("option");
      o.value = t.id;
      o.textContent = t.theme;
      topicGroup.appendChild(o);
    });
    el.lessonSel.appendChild(topicGroup);

    el.lessonSel.value = String(selectedLesson);
  }
  buildLessonSelect();

  // The Dialogue toggle only applies to Integrated Chinese lessons; hide it for topics.
  function selectedIsTopic() {
    return typeof selectedLesson === "string" && selectedLesson !== "ALL";
  }
  function syncDialogueVisibility() {
    const hide = selectedIsTopic();
    el.dialogueLabel.style.display = hide ? "none" : "";
    el.dialogueToggle.style.display = hide ? "none" : "";
  }
  function lessonLabel() {
    if (selectedLesson === "ALL") return "All lessons";
    const t = TOPICS.find(t => t.id === selectedLesson);
    if (t) return t.theme;
    return `Lesson ${selectedLesson} · ${LESSONS.find(l => l.num === selectedLesson).theme}`;
  }
  function syncRange() {
    const count = selectedWords().length;
    const parts = [lessonLabel()];
    if (!selectedIsTopic()) {
      parts.push(selectedDialogue === "BOTH" ? "both dialogues" : `Dialogue ${selectedDialogue}`);
    }
    parts.push(`${count} word${count === 1 ? "" : "s"}`);
    el.rangeInfo.textContent = parts.join(" · ");
  }
  el.lessonSel.addEventListener("change", () => {
    const v = el.lessonSel.value;
    selectedLesson = /^\d+$/.test(v) ? parseInt(v, 10) : v;
    syncDialogueVisibility();
    syncRange();
  });
  el.dialogueToggle.addEventListener("click", e => {
    const b = e.target.closest(".opt");
    if (!b) return;
    selectedDialogue = b.dataset.dia === "BOTH" ? "BOTH" : parseInt(b.dataset.dia, 10);
    [...el.dialogueToggle.children].forEach(c => c.classList.toggle("sel", c === b));
    syncRange();
  });
  syncDialogueVisibility();
  syncRange();

  el.orderToggle.addEventListener("click", e => {
    const b = e.target.closest(".opt");
    if (!b) return;
    order = b.dataset.order;
    [...el.orderToggle.children].forEach(c => c.classList.toggle("sel", c === b));
  });

  el.audioToggle.addEventListener("click", e => {
    const b = e.target.closest(".opt");
    if (!b) return;
    autoPlay = b.dataset.audio;
    [...el.audioToggle.children].forEach(c => c.classList.toggle("sel", c === b));
  });

  function show(name) {
    Object.values(screens).forEach(s => s.classList.remove("active"));
    screens[name].classList.add("active");
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ----- Session flow -----
  function startSession() {
    queue = selectedWords();
    if (order === "shuffle") shuffle(queue);
    else queue = queue.slice(); // copy
    totalThisRound = queue.length;
    cleared = 0;
    show("study");
    nextCard();
  }

  function nextCard() {
    if (queue.length === 0) {
      el.doneSummary.textContent = `You cleared ${totalThisRound} word${totalThisRound === 1 ? "" : "s"}.`;
      show("done");
      return;
    }
    const c = queue[0];
    revealed = false;
    currentZh = c.w;
    el.word.textContent = c.w;
    el.pinyin.textContent = c.pinyin;
    el.pos.textContent = c.pos;
    el.english.textContent = c.def;
    el.breakdown.innerHTML = c.parts || "";
    el.mnemonic.innerHTML = c.mnem || "";
    el.speakBtn.classList.remove("playing");
    el.speakSlowBtn.classList.remove("playing");
    el.speakMp3Btn.classList.remove("playing");
    Mp3Audio.stop();

    el.answer.classList.remove("show");
    el.actions.classList.remove("show");
    el.revealRow.style.display = "block";
    el.hint.style.display = "block";
    updateProgress();
  }

  function updateProgress() {
    el.progress.textContent = `${cleared} / ${totalThisRound}`;
  }

  function reveal() {
    if (revealed) return;
    revealed = true;
    el.answer.classList.add("show");
    el.actions.classList.add("show");
    el.revealRow.style.display = "none";
    el.hint.style.display = "none";
    if (autoPlay === "tts") Speech.speak(currentZh, el.speakBtn);
    else if (autoPlay === "mp3") Mp3Audio.play(currentZh, el.speakMp3Btn);
  }

  function gotIt() {
    if (!revealed) return;
    queue.shift();          // remove from session
    cleared++;
    nextCard();
  }

  function again() {
    if (!revealed) return;
    const c = queue.shift();
    // push back near the end so it returns later this session
    const insertAt = Math.min(queue.length, 4);
    queue.splice(insertAt, 0, c);
    nextCard();
  }

  // ----- Events -----
  el.startBtn.addEventListener("click", startSession);
  el.restartBtn.addEventListener("click", () => show("start"));
  el.quitBtn.addEventListener("click", () => show("start"));
  el.card.addEventListener("click", reveal);
  el.revealBtn.addEventListener("click", reveal);
  el.gotBtn.addEventListener("click", gotIt);
  el.againBtn.addEventListener("click", again);
  const SLOW_RATE = 0.5;
  el.speakBtn.addEventListener("click", e => {
    e.stopPropagation();   // don't bubble to the card
    Speech.speak(currentZh, el.speakBtn);
  });
  el.speakSlowBtn.addEventListener("click", e => {
    e.stopPropagation();
    Speech.speak(currentZh, el.speakSlowBtn, SLOW_RATE);
  });
  el.speakMp3Btn.addEventListener("click", e => {
    e.stopPropagation();
    Mp3Audio.play(currentZh, el.speakMp3Btn);
  });

  document.addEventListener("keydown", e => {
    if (!screens.study.classList.contains("active")) return;
    if (e.code === "Space") { e.preventDefault(); reveal(); return; }
    if (!revealed) return;
    if (e.key === "r" || e.key === "R") { e.preventDefault(); Speech.speak(currentZh, el.speakBtn); return; }
    if (e.key === "s" || e.key === "S") { e.preventDefault(); Speech.speak(currentZh, el.speakSlowBtn, SLOW_RATE); return; }
    if (e.key === "m" || e.key === "M") { e.preventDefault(); Mp3Audio.play(currentZh, el.speakMp3Btn); return; }
    if (e.key === "1" || e.key === "ArrowLeft")  { e.preventDefault(); again(); }
    if (e.key === "2" || e.key === "ArrowRight" || e.key === "Enter") { e.preventDefault(); gotIt(); }
  });

  // ----- Init -----
  if (!Speech.supported) {           // very old browsers: hide TTS UI but keep MP3 button
    el.audioSection.hidden = true;
    el.speakBtn.hidden = true;
    el.speakSlowBtn.hidden = true;
    autoPlay = "off";
  }
</script>
</body>
</html>
