<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Trainer</title>
<style>
  :root {
    --bg: #f4f4f5;
    --card: #ffffff;
    --ink: #18181b;
    --muted: #71717a;
    --line: #e4e4e7;
    --green: #16a34a;
    --amber: #d97706;
    --accent: #2563eb;
    --sel-bg: #eff6ff;
    color-scheme: light;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #18181b;
      --card: #27272a;
      --ink: #f4f4f5;
      --muted: #a1a1aa;
      --line: #3f3f46;
      --green: #22c55e;
      --amber: #f59e0b;
      --accent: #60a5fa;
      --sel-bg: #1e3a5f;
      color-scheme: dark;
    }
  }
  :root[data-theme="dark"] {
    --bg: #18181b;
    --card: #27272a;
    --ink: #f4f4f5;
    --muted: #a1a1aa;
    --line: #3f3f46;
    --green: #22c55e;
    --amber: #f59e0b;
    --accent: #60a5fa;
    --sel-bg: #1e3a5f;
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap { width: 100%; max-width: 600px; }
  .screen { display: none; }
  .screen.active { display: block; }

  h1 { font-size: 1.6rem; margin: 0 0 4px; text-align: center; }
  .sub { color: var(--muted); text-align: center; margin: 0 0 28px; font-size: .95rem; }

  .label { font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 10px; }

  .toggle { display: flex; gap: 10px; margin-bottom: 24px; }
  .toggle .opt { flex: 1; }
  .opt {
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 12px;
    padding: 14px 10px;
    font-size: 1rem;
    cursor: pointer;
    transition: border-color .12s, background .12s;
  }
  .opt:hover { border-color: var(--accent); }
  .opt.sel { border-color: var(--accent); background: var(--sel-bg); color: var(--accent); font-weight: 600; }

  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font-size: 1.15rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: border-color .12s;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  .range { display: flex; align-items: flex-end; gap: 12px; margin-bottom: 8px; }
  .range label { flex: 1; display: flex; flex-direction: column; gap: 6px; font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
  .range .dash { padding-bottom: 14px; color: var(--muted); }
  .range select {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    border-radius: 12px;
    padding: 14px 10px;
    font-size: 1rem;
    cursor: pointer;
    appearance: none;
    text-align: center;
  }
  .range select:focus { outline: none; border-color: var(--accent); }
  .rangeInfo { color: var(--muted); font-size: .9rem; margin: 0 0 24px; text-align: center; min-height: 1.2em; }

  .btn {
    display: block;
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    transition: opacity .12s;
  }
  .btn:hover { opacity: .9; }

  /* Card screen */
  .topbar { display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: .9rem; margin-bottom: 20px; }
  .topbar a { color: var(--muted); text-decoration: none; cursor: pointer; }
  .topbar a:hover { color: var(--ink); }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 40px 28px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    min-height: 340px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .english { font-size: 1.7rem; line-height: 1.35; margin: 0; }
  .hint { color: var(--muted); margin-top: 28px; font-size: .9rem; }

  .answer { display: none; margin-top: 26px; padding-top: 24px; border-top: 1px solid var(--line); }
  .answer.show { display: block; }
  .chinese { font-size: 2.7rem; line-height: 1.3; margin: 0 0 14px; letter-spacing: .02em; }
  .pinyin { font-size: 1.35rem; margin: 0; color: var(--accent); }

  .speak {
    margin-top: 18px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--accent);
    border-radius: 999px;
    padding: 9px 18px;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: border-color .12s, background .12s, color .12s;
  }
  .speak:hover { border-color: var(--accent); background: var(--sel-bg); }
  .speak.playing { border-color: var(--amber); color: var(--amber); }
  .speak[hidden], #audioSection[hidden] { display: none; }

  .reveal-row { margin-top: 16px; }

  .actions { display: none; gap: 12px; margin-top: 16px; }
  .actions.show { display: flex; }
  .actions .btn { flex: 1; }
  .btn.again { background: var(--amber); }
  .btn.got { background: var(--green); }
  .btn small { font-weight: 400; opacity: .85; }

  /* Done screen */
  .done { text-align: center; }
  .done .big { font-size: 3rem; margin: 0 0 8px; }
</style>
<script>
  // Apply saved theme before paint to avoid a flash.
  (function () {
    var t = localStorage.getItem("theme");
    if (t) document.documentElement.setAttribute("data-theme", t);
  })();
</script>
</head>
<body>
<button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
<div class="wrap">

  <!-- START -->
  <section id="start" class="screen active">
    <h1>Sentence Trainer</h1>
    <p class="sub">Read the English, recall the Chinese — flashcard style.</p>

    <p class="label">Level</p>
    <div class="toggle" id="levelToggle">
      <button class="opt sel" data-level="hsk1">HSK 1</button>
      <button class="opt" data-level="hsk2">HSK 2</button>
    </div>

    <p class="label">Which sentences?</p>
    <div class="range">
      <label>From
        <select id="fromSel"></select>
      </label>
      <span class="dash">&ndash;</span>
      <label>To
        <select id="toSel"></select>
      </label>
    </div>
    <p class="rangeInfo" id="rangeInfo"></p>

    <p class="label">Order</p>
    <div class="toggle" id="orderToggle">
      <button class="opt sel" data-order="shuffle">Shuffle</button>
      <button class="opt" data-order="ordered">In order</button>
    </div>

    <div id="audioSection">
      <p class="label">Audio</p>
      <div class="toggle" id="audioToggle">
        <button class="opt sel" data-audio="on">🔊 Auto-play</button>
        <button class="opt" data-audio="off">Off</button>
      </div>
    </div>

    <button class="btn" id="startBtn">Start</button>
  </section>

  <!-- CARD -->
  <section id="study" class="screen">
    <div class="topbar">
      <a id="quitBtn">&larr; Quit</a>
      <span id="progress">0 / 0</span>
    </div>

    <div class="card" id="card">
      <p class="english" id="english">…</p>
      <div class="answer" id="answer">
        <p class="chinese" id="chinese"></p>
        <p class="pinyin" id="pinyin"></p>
        <button class="speak" id="speakBtn" type="button" title="Replay (R)">🔊 Play sound</button>
      </div>
      <p class="hint" id="hint">Tap card or press Space to reveal</p>
    </div>

    <div class="reveal-row" id="revealRow">
      <button class="btn" id="revealBtn">Reveal</button>
    </div>

    <div class="actions" id="actions">
      <button class="btn again" id="againBtn">Again <small>(1)</small></button>
      <button class="btn got" id="gotBtn">Got it <small>(2)</small></button>
    </div>
  </section>

  <!-- DONE -->
  <section id="done" class="screen">
    <div class="done">
      <p class="big">All cleared! 🎉</p>
      <p class="sub" id="doneSummary"></p>
      <button class="btn" id="restartBtn">Study again</button>
    </div>
  </section>

</div>

<script src="sentences_data.js"></script>
<script>
  // ----- Dark mode toggle -----
  (function () {
    const root = document.documentElement;
    const toggle = document.getElementById("themeToggle");
    const mql = window.matchMedia("(prefers-color-scheme: dark)");
    function current() {
      return root.getAttribute("data-theme") || (mql.matches ? "dark" : "light");
    }
    function syncIcon() {
      toggle.textContent = current() === "dark" ? "☀️" : "🌙";
    }
    toggle.addEventListener("click", () => {
      const next = current() === "dark" ? "light" : "dark";
      root.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
      syncIcon();
    });
    mql.addEventListener("change", () => { if (!root.getAttribute("data-theme")) syncIcon(); });
    syncIcon();
  })();

  const DATA = window.SENTENCE_DATA || { hsk1: [], hsk2: [] };

  // ----- State -----
  let level = "hsk1";
  let rangeFrom = 1;     // 1-based, inclusive
  let rangeTo = 50;      // 1-based, inclusive
  let order = "shuffle";
  let autoPlay = true;
  let queue = [];
  let totalThisRound = 0;
  let cleared = 0;
  let revealed = false;
  let currentZh = "";

  // ----- Pronunciation: Web Speech API (Option A) -----
  const Speech = (() => {
    const synth = window.speechSynthesis;
    let voice = null;
    function pick() {
      if (!synth) return;
      const zh = synth.getVoices().filter(v => v.lang && v.lang.toLowerCase().startsWith("zh"));
      // prefer mainland simplified, then any Chinese voice
      voice = zh.find(v => /^zh[-_]?(cn|hans)/i.test(v.lang)) || zh[0] || null;
    }
    if (synth) { pick(); synth.addEventListener("voiceschanged", pick); }
    function speak(text, btn) {
      if (!synth || !text) return;
      synth.cancel();
      if (!voice) pick();
      const u = new SpeechSynthesisUtterance(text);
      if (voice) u.voice = voice;
      u.lang = (voice && voice.lang) || "zh-CN";
      u.rate = 0.9;
      if (btn) {
        u.onstart = () => btn.classList.add("playing");
        const done = () => btn.classList.remove("playing");
        u.onend = done; u.onerror = done;
      }
      synth.speak(u);
    }
    return { supported: !!synth, speak };
  })();

  // ----- Elements -----
  const screens = {
    start: document.getElementById("start"),
    study: document.getElementById("study"),
    done:  document.getElementById("done"),
  };
  const el = {
    levelToggle: document.getElementById("levelToggle"),
    fromSel:     document.getElementById("fromSel"),
    toSel:       document.getElementById("toSel"),
    rangeInfo:   document.getElementById("rangeInfo"),
    orderToggle: document.getElementById("orderToggle"),
    audioToggle: document.getElementById("audioToggle"),
    audioSection:document.getElementById("audioSection"),
    speakBtn:    document.getElementById("speakBtn"),
    startBtn:    document.getElementById("startBtn"),
    progress:    document.getElementById("progress"),
    card:        document.getElementById("card"),
    english:     document.getElementById("english"),
    answer:      document.getElementById("answer"),
    chinese:     document.getElementById("chinese"),
    pinyin:      document.getElementById("pinyin"),
    hint:        document.getElementById("hint"),
    revealRow:   document.getElementById("revealRow"),
    revealBtn:   document.getElementById("revealBtn"),
    actions:     document.getElementById("actions"),
    againBtn:    document.getElementById("againBtn"),
    gotBtn:      document.getElementById("gotBtn"),
    quitBtn:     document.getElementById("quitBtn"),
    doneSummary: document.getElementById("doneSummary"),
    restartBtn:  document.getElementById("restartBtn"),
  };

  function deck() { return DATA[level] || []; }

  // ----- Start screen setup -----
  function buildRangeOptions() {
    const total = deck().length;
    const step = 50;
    const froms = [], tos = [];
    for (let v = 1; v <= total; v += step) froms.push(v);
    for (let v = step; v < total; v += step) tos.push(v);
    tos.push(total);

    el.fromSel.innerHTML = "";
    el.toSel.innerHTML = "";
    froms.forEach(v => el.fromSel.appendChild(opt(v)));
    tos.forEach(v => el.toSel.appendChild(opt(v)));

    // keep current selection if still valid, else reset to first set
    if (rangeFrom > total) rangeFrom = 1;
    if (rangeTo > total) rangeTo = Math.min(step, total);
    el.fromSel.value = froms.includes(rangeFrom) ? rangeFrom : froms[0];
    el.toSel.value = tos.includes(rangeTo) ? rangeTo : tos[0];
    syncRange();
  }
  function opt(v) {
    const o = document.createElement("option");
    o.value = v; o.textContent = "#" + v;
    return o;
  }

  function syncRange() {
    rangeFrom = parseInt(el.fromSel.value, 10);
    rangeTo = parseInt(el.toSel.value, 10);
    if (rangeTo < rangeFrom) {
      const tos = [...el.toSel.options].map(o => parseInt(o.value, 10));
      rangeTo = tos.find(v => v >= rangeFrom);
      el.toSel.value = rangeTo;
    }
    const count = rangeTo - rangeFrom + 1;
    const name = level === "hsk1" ? "HSK 1" : "HSK 2";
    el.rangeInfo.textContent = `${name} · sentences ${rangeFrom}–${rangeTo} · ${count} card${count === 1 ? "" : "s"}`;
  }

  el.fromSel.addEventListener("change", syncRange);
  el.toSel.addEventListener("change", syncRange);

  el.levelToggle.addEventListener("click", e => {
    const b = e.target.closest(".opt");
    if (!b) return;
    level = b.dataset.level;
    [...el.levelToggle.children].forEach(c => c.classList.toggle("sel", c === b));
    buildRangeOptions();
  });

  el.orderToggle.addEventListener("click", e => {
    const b = e.target.closest(".opt");
    if (!b) return;
    order = b.dataset.order;
    [...el.orderToggle.children].forEach(c => c.classList.toggle("sel", c === b));
  });

  el.audioToggle.addEventListener("click", e => {
    const b = e.target.closest(".opt");
    if (!b) return;
    autoPlay = b.dataset.audio === "on";
    [...el.audioToggle.children].forEach(c => c.classList.toggle("sel", c === b));
  });

  function show(name) {
    Object.values(screens).forEach(s => s.classList.remove("active"));
    screens[name].classList.add("active");
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ----- Session flow -----
  function startSession() {
    queue = deck().slice(rangeFrom - 1, rangeTo);
    if (order === "shuffle") shuffle(queue);
    else queue = queue.slice();
    totalThisRound = queue.length;
    cleared = 0;
    show("study");
    nextCard();
  }

  function nextCard() {
    if (queue.length === 0) {
      el.doneSummary.textContent = `You cleared ${totalThisRound} sentence${totalThisRound === 1 ? "" : "s"}.`;
      show("done");
      return;
    }
    const c = queue[0];
    revealed = false;
    currentZh = c.zh;
    el.english.textContent = c.en;
    el.chinese.textContent = c.zh;
    el.pinyin.textContent = c.py;
    el.speakBtn.classList.remove("playing");

    el.answer.classList.remove("show");
    el.actions.classList.remove("show");
    el.revealRow.style.display = "block";
    el.hint.style.display = "block";
    updateProgress();
  }

  function updateProgress() {
    el.progress.textContent = `${cleared} / ${totalThisRound}`;
  }

  function reveal() {
    if (revealed) return;
    revealed = true;
    el.answer.classList.add("show");
    el.actions.classList.add("show");
    el.revealRow.style.display = "none";
    el.hint.style.display = "none";
    if (autoPlay) Speech.speak(currentZh, el.speakBtn);
  }

  function gotIt() {
    if (!revealed) return;
    queue.shift();
    cleared++;
    nextCard();
  }

  function again() {
    if (!revealed) return;
    const c = queue.shift();
    const insertAt = Math.min(queue.length, 4);
    queue.splice(insertAt, 0, c);
    nextCard();
  }

  // ----- Events -----
  el.startBtn.addEventListener("click", startSession);
  el.restartBtn.addEventListener("click", () => show("start"));
  el.quitBtn.addEventListener("click", () => show("start"));
  el.card.addEventListener("click", reveal);
  el.revealBtn.addEventListener("click", reveal);
  el.gotBtn.addEventListener("click", gotIt);
  el.againBtn.addEventListener("click", again);
  el.speakBtn.addEventListener("click", e => {
    e.stopPropagation();   // don't bubble to the card
    Speech.speak(currentZh, el.speakBtn);
  });

  document.addEventListener("keydown", e => {
    if (!screens.study.classList.contains("active")) return;
    if (e.code === "Space") { e.preventDefault(); reveal(); return; }
    if (!revealed) return;
    if (e.key === "r" || e.key === "R") { e.preventDefault(); Speech.speak(currentZh, el.speakBtn); return; }
    if (e.key === "1" || e.key === "ArrowLeft")  { e.preventDefault(); again(); }
    if (e.key === "2" || e.key === "ArrowRight" || e.key === "Enter") { e.preventDefault(); gotIt(); }
  });

  // ----- Init -----
  if (!Speech.supported) {           // very old browsers: hide audio UI
    el.audioSection.hidden = true;
    el.speakBtn.hidden = true;
    autoPlay = false;
  }
  buildRangeOptions();
</script>
</body>
</html>
